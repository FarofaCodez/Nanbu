<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Nanbu menu</title>
</head>
<body>
	<div>
		<input type="text" name="name" id="name" placeholder="Player name">
		<br>
		<a href="javascript:joinGame()">Play Multiplayer</a>
	</div>
	<script>
		function joinGame() {
			const name = document.querySelector("#name").value;
			window.location.href = `game.html?name=${name}`;
		}
	</script>
</body>
</html>
