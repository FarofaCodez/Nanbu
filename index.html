<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Nanbu</title>
	<link rel="stylesheet" href="style.css">
	<link rel="shortcut icon" href="favicon.svg" type="image/svg+xml">
</head>
<body>
	<canvas id="game" width="640" height="480"></canvas>
	<div id="inventory" class="menu center" style="display: none;">
		<p>Inventory</p>
		<div id="inventory-items">
			<p>No items</p>
		</div>
	</div>

	<div id="buy-page" class="menu center" style="display: none;">
		<p>Buy something</p>
		<div id="buy-items"></div>
		<p id="buyMessage"></p>
	</div>

	<div id="menu" class="menu center">
		<h1>Nanbu</h1>
		<button onclick="play()">Play</button>
		<br><br>
		<button onclick="multiplayer()">Play Multiplayer</button>
		<p id="loadingMessage"></p>
		<script src="menu.js"></script>
	</div>

	<pre id="chat" class="menu" id="chat" style="display: none;"></pre>
</body>
</html>
